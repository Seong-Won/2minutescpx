<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2분 CPX</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f8fd;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
#app{width:100%;max-width:860px}
.page{display:none;min-height:600px}
.page.active{display:flex}
.logo{font-size:17px;font-weight:500;color:#185FA5;letter-spacing:-0.3px}
.logo span{font-size:11px;font-weight:400;color:#378ADD;margin-left:4px;vertical-align:middle}

#page1{flex-direction:column;border:0.5px solid #B5D4F4;border-radius:12px;overflow:hidden;background:#fff}
.p1-header{padding:0.9rem 1.25rem;border-bottom:0.5px solid #B5D4F4;background:#E6F1FB}
.p1-body{display:flex;flex:1}
.col{padding:1.25rem;border-right:0.5px solid #B5D4F4}
.col:last-child{border-right:none}
.col-left{width:40%;overflow-y:auto;max-height:530px}
.col-mid{width:28%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem}
.col-right{width:32%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem}
.col-title{font-size:11px;font-weight:500;color:#185FA5;margin-bottom:0.6rem;letter-spacing:0.05em;text-transform:uppercase}
.symptom-item{display:flex;align-items:center;gap:8px;padding:4px;border-radius:6px;cursor:pointer;transition:background 0.15s}
.symptom-item:hover{background:#E6F1FB}
.symptom-item input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:#185FA5;flex-shrink:0}
.symptom-item label{font-size:12.5px;color:#1a1a1a;cursor:pointer;line-height:1.4}
.custom-input-row{display:flex;align-items:center;gap:6px;padding:3px 4px;margin-top:1px}
.custom-input-row input[type=checkbox]{width:14px;height:14px;accent-color:#185FA5;flex-shrink:0}
.custom-input-row input[type=text]{flex:1;font-size:12.5px;padding:2px 6px;border:0.5px solid #85B7EB;border-radius:6px;background:#fff;color:#1a1a1a;outline:none;line-height:1.4}
.custom-input-row input[type=text]:focus{border-color:#185FA5}
.del-btn{width:18px;height:18px;border:0.5px solid #85B7EB;border-radius:50%;background:transparent;color:#378ADD;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1;transition:background 0.15s}
.del-btn:hover{background:#E6F1FB;color:#A32D2D;border-color:#F09595}
.add-btn{margin-top:0.6rem;width:100%;padding:5px;font-size:12px;border:0.5px dashed #85B7EB;border-radius:8px;background:transparent;color:#378ADD;cursor:pointer;transition:background 0.15s}
.add-btn:hover{background:#E6F1FB}
.sel-row{display:flex;gap:6px;margin-bottom:8px}
.sel-btn{font-size:11px;padding:3px 9px;border:0.5px solid #85B7EB;border-radius:20px;background:transparent;cursor:pointer;color:#378ADD}
.sel-btn:hover{background:#E6F1FB}
.timer-display{font-size:52px;font-weight:500;color:#0C447C;font-variant-numeric:tabular-nums;letter-spacing:-1px}
.timer-controls{display:flex;align-items:center;gap:10px}
.t-btn{width:30px;height:30px;border:0.5px solid #85B7EB;border-radius:50%;background:transparent;font-size:16px;cursor:pointer;color:#185FA5;display:flex;align-items:center;justify-content:center;transition:background 0.15s}
.t-btn:hover{background:#E6F1FB}
.timer-label{font-size:11px;color:#378ADD;text-align:center}
.start-btn{width:130px;height:130px;border-radius:50%;background:#185FA5;border:none;color:#E6F1FB;font-size:19px;font-weight:500;cursor:pointer;transition:transform 0.15s,background 0.15s;display:flex;align-items:center;justify-content:center}
.start-btn:hover{background:#0C447C;transform:scale(1.04)}
.start-btn:active{transform:scale(0.97)}
.warning{font-size:12px;color:#c0392b;text-align:center;min-height:16px}

#page2{flex-direction:column;align-items:center;justify-content:center;gap:1.25rem;padding:2rem;position:relative;min-height:600px;border:0.5px solid #B5D4F4;border-radius:12px;background:#fff}
.p2-header{position:absolute;top:0;left:0;right:0;padding:0.9rem 1.25rem;border-bottom:0.5px solid #B5D4F4;background:#E6F1FB;display:flex;align-items:center;justify-content:space-between;border-radius:12px 12px 0 0}
.counter-badge{font-size:13px;font-weight:500;color:#185FA5;background:#fff;padding:5px 14px;border-radius:20px;border:0.5px solid #85B7EB}
.countdown-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;z-index:10;border-radius:12px;gap:1.5rem}
.countdown-num{font-size:88px;font-weight:500;color:#185FA5;animation:pop 0.4s ease}
.skip-btn{padding:8px 22px;border:0.5px solid #85B7EB;border-radius:8px;background:transparent;color:#378ADD;font-size:13px;cursor:pointer;transition:background 0.15s}
.skip-btn:hover{background:#E6F1FB}
@keyframes pop{0%{transform:scale(1.5);opacity:0}100%{transform:scale(1);opacity:1}}
.p2-timer{font-size:68px;font-weight:500;color:#0C447C;font-variant-numeric:tabular-nums;letter-spacing:-2px;margin-top:3.5rem}
.p2-timer.urgent{color:#A32D2D}
.progress-bar-wrap{width:100%;max-width:360px;height:4px;background:#B5D4F4;border-radius:2px;overflow:hidden}
.progress-bar{height:100%;background:#185FA5;border-radius:2px;transition:width 0.5s}
.symptom-card{min-width:280px;min-height:76px;background:#E6F1FB;border:0.5px solid #85B7EB;border-radius:12px;display:flex;align-items:center;justify-content:center;padding:1rem 2rem;font-size:21px;font-weight:500;color:#0C447C;text-align:center}
.p2-controls{display:flex;align-items:center;gap:0.75rem;margin-top:0.25rem}
.p2-btn{padding:8px 18px;border:0.5px solid #85B7EB;border-radius:8px;background:transparent;color:#185FA5;font-size:14px;cursor:pointer;transition:background 0.15s}
.p2-btn:hover{background:#E6F1FB}
.p2-btn.primary{background:#185FA5;border-color:#185FA5;color:#E6F1FB}
.p2-btn.primary:hover{background:#0C447C}
.icon-btn{width:40px;height:40px;border:0.5px solid #85B7EB;border-radius:50%;background:transparent;color:#185FA5;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s}
.icon-btn:hover{background:#E6F1FB}
.next-symp-btn{padding:8px 16px;border:0.5px solid #85B7EB;border-radius:8px;background:transparent;color:#185FA5;font-size:13px;cursor:pointer;transition:background 0.15s}
.next-symp-btn:hover{background:#E6F1FB}
.big-next-btn{padding:12px 32px;background:#185FA5;border:none;border-radius:8px;color:#E6F1FB;font-size:15px;font-weight:500;cursor:pointer;transition:background 0.15s}
.big-next-btn:hover{background:#0C447C}
.done-wrap{display:none;flex-direction:column;align-items:center;gap:1.5rem;margin-top:4rem}
.done-msg{font-size:22px;font-weight:500;color:#0C447C;text-align:center}
.done-sub{font-size:14px;color:#378ADD;text-align:center}
</style>
</head>
<body>
<div id="app">

<div id="page1" class="page active">
  <div class="p1-header">
    <div class="logo">2분 CPX <span>Clinical Performance Exam</span></div>
  </div>
  <div class="p1-body">
    <div class="col col-left">
      <div class="col-title">주증상 선택</div>
      <div class="sel-row">
        <button class="sel-btn" onclick="toggleAll(true)">전체 선택</button>
        <button class="sel-btn" onclick="toggleAll(false)">전체 해제</button>
      </div>
      <div id="symptom-list"></div>
      <button class="add-btn" onclick="addCustomRow()">+ 주증상 추가</button>
    </div>
    <div class="col col-mid">
      <div class="col-title">타이머 설정</div>
      <div class="timer-display" id="timer-preview">2:00</div>
      <div class="timer-controls">
        <button class="t-btn" onclick="adjustTimer(-10)">−</button>
        <span style="font-size:12px;color:#378ADD">10초</span>
        <button class="t-btn" onclick="adjustTimer(10)">+</button>
      </div>
      <div class="timer-label">기본값: 2분 / 최소 10초</div>
    </div>
    <div class="col col-right">
      <div class="col-title">준비</div>
      <button class="start-btn" onclick="startSession()">시작</button>
      <div class="warning" id="warn"></div>
      <div style="font-size:11px;color:#378ADD;text-align:center">하나 이상의 주증상을<br>선택 후 시작하세요</div>
    </div>
  </div>
</div>

<div id="page2" class="page">
  <div class="p2-header">
    <div class="logo">2분 CPX <span>Clinical Performance Exam</span></div>
    <div class="counter-badge" id="counter">0/0</div>
  </div>
  <div class="countdown-overlay" id="countdown-overlay" style="display:none">
    <div class="countdown-num" id="countdown-num">3</div>
    <button class="skip-btn" onclick="skipCountdown()">바로 시작</button>
  </div>
  <div class="p2-timer" id="p2-timer">2:00</div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="prog-bar" style="width:100%"></div></div>
  <div class="symptom-card" id="symptom-card" style="font-size:15px;color:#378ADD">주증상 보기를 눌러 학습하세요.</div>
  <div class="p2-controls">
    <button class="p2-btn" onclick="goHome()">‹ 처음으로</button>
    <button class="p2-btn primary" id="show-btn" onclick="showSymptom()">주증상 보기</button>
    <button class="icon-btn" id="playstop-btn" onclick="toggleTimer()">⏸</button>
    <button class="next-symp-btn" id="next-symp-btn" onclick="nextSymptom()">다음 주증상 ›</button>
  </div>
  <div id="next-wrap" style="display:none;margin-top:0.5rem">
    <button class="big-next-btn" onclick="nextSymptom()">다음 주증상 연습하기</button>
  </div>
  <div class="done-wrap" id="done-wrap">
    <div class="done-msg">🎉 학습이 종료되었습니다!</div>
    <div class="done-sub" id="done-sub"></div>
    <button class="big-next-btn" onclick="goHome()">처음으로 돌아가기</button>
  </div>
</div>

</div>

<script>
const SYMPTOMS=['급성 복통','소변량 변화(다뇨증/핍뇨)','두통','소화불량/만성 복통','붉은색 소변','경련','토혈','배뇨 이상/소변찔끔증','근력/감각 이상','혈변','발열','의식장애','구토','쉽게 멍이 듦','떨림/운동 이상','배변 이상(변비/설사)','피로','유방통/유방덩이','황달','체중 감소','질분비물/질출혈','가슴 통증','체중 증가/비만','월경 이상/월경통','실신','관절 통증/부기','산전 진찰','두근거림','목 통증/허리 통증','성장/발달 지연','고혈압','피부 발진','예방접종','이상지질혈증','기분 변화','음주/금연 상담','기침','불안','물질 오남용','콧물/코막힘','수면장애','나쁜 소식 전하기','객혈','기억력 저하','가정 폭력/성 폭력','호흡곤란','어지럼','자살'];

let timerSecs=120,p2Secs=120,p2Total=120;
let timerInterval=null,running=false;
let remaining=[],totalCount=0;
let countdownTO=null;

function buildList(){
  const el=document.getElementById('symptom-list');
  el.innerHTML='';
  SYMPTOMS.forEach((s,i)=>{
    const row=document.createElement('div');
    row.className='symptom-item';
    row.innerHTML=`<input type="checkbox" id="s${i}" value="${s}"><label for="s${i}">${s}</label>`;
    el.appendChild(row);
  });
}

function addCustomRow(){
  const list=document.getElementById('symptom-list');
  const row=document.createElement('div');
  row.className='custom-input-row';
  const cb=document.createElement('input');
  cb.type='checkbox';cb.checked=true;cb.value='';
  const inp=document.createElement('input');
  inp.type='text';inp.placeholder='새로운 주증상 입력';
  inp.addEventListener('input',()=>{cb.value=inp.value.trim();});
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();});
  const del=document.createElement('button');
  del.className='del-btn';del.textContent='−';del.title='삭제';
  del.addEventListener('click',()=>row.remove());
  row.appendChild(cb);row.appendChild(inp);row.appendChild(del);
  list.appendChild(row);
  setTimeout(()=>inp.focus(),50);
}

function toggleAll(val){
  document.querySelectorAll('#symptom-list input[type=checkbox]').forEach(c=>c.checked=val);
}

function adjustTimer(d){
  timerSecs=Math.max(10,timerSecs+d);
  document.getElementById('timer-preview').textContent=fmt(timerSecs);
}

function fmt(s){const m=Math.floor(s/60),sc=s%60;return m+':'+(sc<10?'0':'')+sc;}

function getChecked(){
  const vals=[];
  document.querySelectorAll('#symptom-list input[type=checkbox]:checked').forEach(c=>{const v=c.value.trim();if(v)vals.push(v);});
  document.querySelectorAll('.custom-input-row input[type=checkbox]:checked').forEach(c=>{const v=c.value.trim();if(v)vals.push(v);});
  return vals;
}

function startSession(){
  const checked=getChecked();
  if(checked.length===0){document.getElementById('warn').textContent='하나 이상의 주증상을 고르세요.';return;}
  document.getElementById('warn').textContent='';
  remaining=shuffle([...checked]);
  totalCount=remaining.length;
  p2Total=timerSecs;
  goPage2();
}

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

function goPage2(){
  document.getElementById('page1').classList.remove('active');
  document.getElementById('page2').classList.add('active');
  resetP2UI();
  runCountdown(3);
}

function resetP2UI(){
  clearInterval(timerInterval);running=false;p2Secs=p2Total;
  document.getElementById('p2-timer').textContent=fmt(p2Total);
  document.getElementById('p2-timer').classList.remove('urgent');
  document.getElementById('p2-timer').style.display='';
  document.getElementById('prog-bar').style.width='100%';
  document.getElementById('prog-bar').parentElement.style.display='';
  document.getElementById('symptom-card').innerHTML='주증상 보기를 눌러 학습하세요.';
  document.getElementById('symptom-card').style.fontSize='15px';
  document.getElementById('symptom-card').style.color='#378ADD';
  document.getElementById('symptom-card').style.display='';
  document.getElementById('next-wrap').style.display='none';
  document.getElementById('done-wrap').style.display='none';
  document.getElementById('show-btn').style.display='';
  document.getElementById('playstop-btn').textContent='⏸';
  document.getElementById('playstop-btn').style.display='';
  document.getElementById('next-symp-btn').style.display='';
  const pc=document.querySelector('.p2-controls');if(pc)pc.style.display='';
  updateCounter();
}

function updateCounter(){
  document.getElementById('counter').textContent='남은 주증상: '+remaining.length+'/'+totalCount;
}

function runCountdown(n){
  const overlay=document.getElementById('countdown-overlay');
  const numEl=document.getElementById('countdown-num');
  overlay.style.display='flex';
  numEl.textContent=n===0?'시작!':n;
  if(n===0){setTimeout(()=>{overlay.style.display='none';startTimer();},500);return;}
  countdownTO=setTimeout(()=>{
    numEl.style.animation='none';void numEl.offsetWidth;numEl.style.animation='pop 0.4s ease';
    runCountdown(n-1);
  },750);
}

function skipCountdown(){
  clearTimeout(countdownTO);
  document.getElementById('countdown-overlay').style.display='none';
  startTimer();
}

function startTimer(){
  running=true;document.getElementById('playstop-btn').textContent='⏸';
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(!running)return;p2Secs--;
    document.getElementById('p2-timer').textContent=fmt(p2Secs);
    document.getElementById('p2-timer').classList.toggle('urgent',p2Secs<=10);
    document.getElementById('prog-bar').style.width=(p2Secs/p2Total*100)+'%';
    if(p2Secs<=0){clearInterval(timerInterval);running=false;timerDone();}
  },1000);
}

function toggleTimer(){
  if(running){running=false;document.getElementById('playstop-btn').textContent='▶';}
  else{running=true;document.getElementById('playstop-btn').textContent='⏸';}
}

function timerDone(){
  document.getElementById('show-btn').style.display='none';
  document.getElementById('playstop-btn').style.display='none';
  document.getElementById('next-symp-btn').style.display='none';
  if(remaining.length===0){showDone();}
  else{document.getElementById('next-wrap').style.display='block';}
}

function showSymptom(){
  if(remaining.length===0){showDone();return;}
  const idx=Math.floor(Math.random()*remaining.length);
  const sym=remaining.splice(idx,1)[0];
  document.getElementById('symptom-card').textContent=sym;
  document.getElementById('symptom-card').style.fontSize='21px';
  document.getElementById('symptom-card').style.color='#0C447C';
  updateCounter();
  document.getElementById('show-btn').style.display='none';
}

function nextSymptom(){
  clearInterval(timerInterval);
  if(remaining.length===0){showDone();return;}
  resetP2UI();runCountdown(3);
}

function showDone(){
  clearInterval(timerInterval);running=false;
  document.getElementById('p2-timer').style.display='none';
  document.getElementById('prog-bar').parentElement.style.display='none';
  document.getElementById('symptom-card').style.display='none';
  document.getElementById('next-wrap').style.display='none';
  const pc=document.querySelector('.p2-controls');if(pc)pc.style.display='none';
  document.getElementById('done-wrap').style.display='flex';
  document.getElementById('done-sub').textContent='총 '+totalCount+'개 주증상 학습 완료';
}

function goHome(){
  clearTimeout(countdownTO);clearInterval(timerInterval);running=false;
  document.getElementById('p2-timer').style.display='';
  document.getElementById('prog-bar').parentElement.style.display='';
  document.getElementById('symptom-card').style.display='';
  const pc=document.querySelector('.p2-controls');if(pc)pc.style.display='';
  document.getElementById('page2').classList.remove('active');
  document.getElementById('page1').classList.add('active');
}

buildList();
</script>
</body>
</html>
